server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: route everything through index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
